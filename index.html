<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
    min-height:60px;
}

p{
    margin-bottom:30px;
    font-size:20px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

#sim{
    background:#22c55e;
    color:white;
}

#nao{
    background:#ef4444;
    color:white;
}

.botoes{
    display:none;
    gap:20px;
    position:relative;
}

.sucesso{
    animation:zoom 1s ease;
}

@keyframes zoom{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1 id="titulo"></h1>

    <p id="texto"></p>

    <div class="botoes" id="botoes">
        <button id="sim" onclick="aceitou()">Sim ❤️</button>
        <button id="nao">Não 😅</button>
    </div>

</div>

<script>

const titulo = document.getElementById("titulo");
const texto = document.getElementById("texto");
const botoes = document.getElementById("botoes");

function digitar(elemento, textoDigitar, velocidade=60){

    let i = 0;

    const intervalo = setInterval(() => {

        elemento.innerHTML += textoDigitar.charAt(i);

        i++;

        if(i >= textoDigitar.length){
            clearInterval(intervalo);
        }

    }, velocidade);

}

setTimeout(()=>{
    digitar(titulo,"Oi ❤️");
},500);

setTimeout(()=>{
    texto.innerHTML="Tenho um convite especial para você...";
},2500);

setTimeout(()=>{
    titulo.innerHTML="🙏";
    texto.innerHTML="Você aceita ir à igreja comigo neste domingo?";
    botoes.style.display="flex";
},5000);

let tentativas = 0;

const frases = [
    "Tem certeza? 🥺",
    "Pensa bem 😅",
    "Vai ter café depois ☕",
    "Prometo que vai ser legal 🙏",
    "Última chance 👀",
    "O botão NÃO está ficando nervoso 😂",
    "Você realmente quer apertar isso? 🤔",
    "Tá ficando difícil defender você 😅"
];

const botaoNao = document.getElementById("nao");

botaoNao.addEventListener("mouseover",()=>{

    tentativas++;

    if(tentativas <= frases.length){
        alert(frases[tentativas-1]);
    }

    if(tentativas >= 4){

        const largura = window.innerWidth - 180;
        const altura = window.innerHeight - 100;

        const x = Math.random()*largura;
        const y = Math.random()*altura;

        botaoNao.style.position="absolute";
        botaoNao.style.left=x+"px";
        botaoNao.style.top=y+"px";
    }

    if(tentativas === 10){

        alert("😂 Tá bom, você venceu.");

        botaoNao.onclick = () => {

            document.body.innerHTML = `
            <div class="container sucesso">
                <h1>😎 Você conseguiu clicar!</h1>
                <p>
                    Tudo bem 😊<br><br>
                    O convite continua de pé ❤️
                </p>
            </div>
            `;
        };

        botaoNao.style.position="static";
    }

});

function aceitou(){

    document.body.innerHTML = `
    <div class="container sucesso">

        <h1>🎉🥳 Que alegria! 🥳🎉</h1>

        <p>
            Te espero no domingo ❤️
            <br><br>
            "Porque onde estiverem dois ou três reunidos em meu nome,
            ali eu estou."
            <br><br>
            Mateus 18:20 🙏
        </p>

    </div>
    `;
}

</script>

</body>
</html>
