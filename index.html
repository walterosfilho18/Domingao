<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.container{
text-align:center;
padding:20px;
width:100%;
max-width:500px;
}

.emoji-principal{
font-size:70px;
margin-bottom:20px;
animation:flutuar 2s infinite ease-in-out;
}

@keyframes flutuar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
font-size:28px;
margin-bottom:15px;
}

p{
font-size:20px;
margin-bottom:35px;
color:#d1d5db;
}

.botoes{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
border:none;
padding:15px 30px;
border-radius:15px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

#sim{
background:#16a34a;
color:white;
}

#sim:hover{
transform:scale(1.05);
}

#nao{
background:#dc2626;
color:white;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.modal-card{
background:white;
color:#111827;
width:100%;
max-width:350px;
border-radius:25px;
padding:30px;
text-align:center;
animation:aparecer .3s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

.modal-emoji{
font-size:55px;
margin-bottom:10px;
}

.modal-card h2{
margin-bottom:10px;
}

.modal-card p{
color:#6b7280;
font-size:16px;
margin-bottom:20px;
}

.modal-card button{
width:100%;
background:#ff5f8f;
color:white;
}

.resultado{
animation:aparecer .8s ease;
}

</style>
</head>
<body>

<div class="container">

<div class="emoji-principal">🙏</div>

<h1>Convite Especial para ANA VICTORIA ❤️</h1>

<p>
Você aceita ir à igreja comigo neste domingo?
</p>

<div class="botoes">

<button id="sim">
Sim ❤️
</button>

<button id="nao">
Não 😅
</button>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-card">

<div class="modal-emoji" id="modalEmoji">
🤔
</div>

<h2 id="modalTitulo">
Pensa bem...
</h2>

<p id="modalTexto">
Vai ser um momento especial ❤️
</p>

<button onclick="fecharModal()">
❤️ Tudo bem, vou pensar
</button>

</div>

</div>

<script>

const modal = document.getElementById("modal");

const mensagens = [

{
emoji:"🤔",
titulo:"Pensa bem...",
texto:"Vai ser um momento especial ❤️"
},

{
emoji:"🥺",
titulo:"Tem certeza?",
texto:"Prometo que será um momento muito leve."
},

{
emoji:"🍔",
titulo:"Vai ter lanche depois",
texto:"Agora ficou mais interessante né? 😅"
},

{
emoji:"🙏",
titulo:"Última chance",
texto:"Tenho certeza que você vai gostar."
},

{
emoji:"😂",
titulo:"O botão NÃO está nervoso",
texto:"Mas você está insistindo bastante..."
}

];

let tentativas = 0;

const botaoNao = document.getElementById("nao");

function fecharModal(){
modal.style.display = "none";
}

botaoNao.addEventListener("click",()=>{

if(tentativas < mensagens.length){

document.getElementById("modalEmoji").innerHTML =
mensagens[tentativas].emoji;

document.getElementById("modalTitulo").innerHTML =
mensagens[tentativas].titulo;

document.getElementById("modalTexto").innerHTML =
mensagens[tentativas].texto;

modal.style.display = "flex";

tentativas++;

return;
}

const largura = window.innerWidth - 150;
const altura = window.innerHeight - 100;

botaoNao.style.position = "fixed";
botaoNao.style.left = Math.random()*largura + "px";
botaoNao.style.top = Math.random()*altura + "px";

});

document.getElementById("sim").addEventListener("click",()=>{

document.body.innerHTML = `

<div class="container resultado">

<div style="font-size:90px;margin-bottom:20px;">
🎉
</div>

<h1>Que alegria! ❤️</h1>

<p>
Te espero no domingo 🙏
<br><br>
"Porque onde estiverem dois ou três reunidos em meu nome,
ali eu estou."
<br><br>
Mateus 18:20
</p>

</div>

`;

setTimeout(() => {

window.location.href =
"https://wa.me/5592984738483?text=Oi!%20❤️%20Eu%20aceito%20o%20convite.%20Que%20horas%20começa?%20😊";

}, 3000);

});

</script>

</body>
</html>
